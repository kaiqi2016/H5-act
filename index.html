<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5-act | 抽奖活动选择</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-950 text-white">
    <div class="max-w-5xl mx-auto px-6 py-16">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-bold tracking-tighter mb-4">选择你的抽奖活动</h1>
            <p class="text-xl text-slate-400">每个活动都有独立页面 + 完整图片主题素材</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <!-- Activity A -->
            <a href="activity-a.html" class="group block bg-slate-900 border border-slate-700 hover:border-indigo-500 rounded-3xl p-8 transition-all hover:-translate-y-1">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span class="px-4 py-1 bg-emerald-500/10 text-emerald-400 text-sm font-bold rounded-3xl">HOT</span>
                        <h2 class="text-4xl font-bold mt-3">活动 A</h2>
                        <p class="text-2xl text-slate-300 mt-1">新年福利抽奖</p>
                    </div>
                    <i class="fa-solid fa-rocket text-6xl text-emerald-400/30 group-hover:text-emerald-400 transition-colors"></i>
                </div>
                <div class="text-slate-400">科技蓝主题 • 128,439 人已参与</div>
                <div class="mt-8 inline-flex items-center text-indigo-400 font-medium group-hover:gap-3 transition-all">
                    进入活动页面 <i class="fa-solid fa-arrow-right ml-2"></i>
                </div>
            </a>

            <!-- Activity B -->
            <a href="activity-b.html" class="group block bg-slate-900 border border-slate-700 hover:border-pink-500 rounded-3xl p-8 transition-all hover:-translate-y-1">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span class="px-4 py-1 bg-pink-500/10 text-pink-400 text-sm font-bold rounded-3xl">NEW</span>
                        <h2 class="text-4xl font-bold mt-3">活动 B</h2>
                        <p class="text-2xl text-slate-300 mt-1">情人节特别版</p>
                    </div>
                    <i class="fa-solid fa-heart text-6xl text-pink-400/30 group-hover:text-pink-400 transition-colors"></i>
                </div>
                <div class="text-slate-400">温暖粉主题 • 67,291 人已参与</div>
                <div class="mt-8 inline-flex items-center text-pink-400 font-medium group-hover:gap-3 transition-all">
                    进入活动页面 <i class="fa-solid fa-arrow-right ml-2"></i>
                </div>
            </a>
        </div>

        <div class="mt-12 text-center text-sm text-slate-500">
            每个活动都支持两套完整图片主题素材（科技蓝 / 温暖粉）
        </div>
    </div>
</body>
</html>
